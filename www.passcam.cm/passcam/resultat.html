<!doctype html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="utf-8">
  <meta name="description" content="Résultat du paiement - portail de pré-enrôlement du passeport électronique du Cameroun">
  <link rel="icon" href="aa.jfif">
  <link rel="stylesheet" href="style1.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <title>Résultat du paiement - Cameroun</title>
  <style>
    .page-section { max-width: 760px; margin: auto; }

    .result-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }
    .result-topbar .result-title {
      color: #009028;
      font-size: 20px;
      font-weight: 700;
    }
    .lang-btn {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }

    /* ── Stepper ── */
    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 34px;
      flex-wrap: wrap;
    }
    .step-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }
    .step-dot.green { background: #009128; }
    .step-dot.blue  { background: #2697ff; }
    .step-line { flex: 1; height: 4px; min-width: 36px; max-width: 70px; }
    .step-line.green { background: #009128; }
    .step-line.blue  { background: #2697ff; }
    .step-line.mix   { background: linear-gradient(to right, #009128 50%, #2697ff 50%); }

    /* ── Result card ── */
    .result-card {
      max-width: 540px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dfe3e8;
      border-radius: 12px;
      box-shadow: 0 8px 26px rgba(42,52,79,.10);
      padding: 28px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .result-info .info-line {
      font-size: 16px;
      color: #2e3e4e;
      margin-bottom: 14px;
    }
    .result-info .info-line .lbl { color: #2e3e4e; }
    .result-info .info-line .val { color: #2697ff; font-weight: 500; }
    .result-info .back-btn {
      margin-top: 8px;
      border: 1px solid #2697ff;
      background: #fff;
      color: #555;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .result-info .back-btn:hover { background: #2697ff; color: #fff; }

    /* ── Infinite spinner ── */
    .result-spinner {
      width: 70px; height: 70px;
      border: 7px solid #e8eef5;
      border-top-color: #2697ff;
      border-radius: 50%;
      animation: rspin 0.9s linear infinite;
      flex-shrink: 0;
    }
    @keyframes rspin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .result-card { flex-direction: column-reverse; text-align: center; }
    }
  </style>
</head>
<body>
<div id="root"><div><div class="layout"><div class="wr">

<header class="purple">
  <div class="purple-wrap">
    <div class="purple-wrap-image"><img src="Police.png" alt="Police"></div>
    <div class="purple-wrap-image"><img src="a.png" alt="Augentic PassCam"></div>
  </div>
</header>

<div class="app">
  <div class="switch">
    <div class="form page-section">

      <div class="result-topbar">
        <div class="result-title">Résultat du paiement</div>
        <button class="lang-btn" type="button">FR</button>
      </div>

      <div class="steps">
        <div class="step-dot green">1</div>
        <div class="step-line green"></div>
        <div class="step-dot green">2</div>
        <div class="step-line green"></div>
        <div class="step-dot green">3</div>
        <div class="step-line mix"></div>
        <div class="step-dot blue">4</div>
        <div class="step-line blue"></div>
        <div class="step-dot blue">5</div>
      </div>

      <div class="result-card">
        <div class="result-info">
          <div class="info-line"><span class="lbl">Numéro de la demande: </span><span class="val" id="req-number">PO-…</span></div>
          <div class="info-line"><span class="lbl">La somme: </span><span class="val">110000 XAF</span></div>
          <div class="info-line"><span class="lbl" id="order-label">Ordre de paiement: </span><span class="val" id="pay-order">AUG…</span></div>
          <button class="back-btn" type="button" onclick="window.location.href='paiement.html'">Retour au paiement</button>
        </div>
        <div class="result-spinner"></div>
      </div>

    </div>
  </div>
</div>

<footer class="release-version">V.20220622-1700cmr-1.90-329-g1dfc1ebcaa </footer>

</div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"></script>
<script>
(function() {
  var p = function(n){ return n < 10 ? '0'+n : ''+n; };

  // Numéro de la demande : réutilise celui du récapitulatif si disponible, sinon en génère un
  var req = localStorage.getItem('reqNumber');
  if (!req) {
    var d = new Date();
    var rand = String(Math.floor(Math.random()*999999)).padStart(6,'0');
    req = 'PO-' + d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + '-' + rand;
    localStorage.setItem('reqNumber', req);
  }
  document.getElementById('req-number').textContent = req;

  // Ordre de paiement : selon le mode de paiement choisi
  var mode = localStorage.getItem('paymentMode');
  var orderLabel = document.getElementById('order-label');
  var orderValue = document.getElementById('pay-order');
  if (mode === 'orange') {
    orderLabel.textContent = 'Ordre de paiement: ';
    orderValue.textContent = 'effectuer le paiement au numero 641088327';
  } else if (mode === 'mtn') {
    orderLabel.textContent = 'Ordre de paiement: ';
    orderValue.textContent = 'effectuer le paiement au numero 673900715';
  } else {
    orderValue.textContent = 'AUG' + String(Math.floor(Math.random()*9999999999)).padStart(10,'0');
  }

  // Le spinner tourne indéfiniment — aucun appel API n'est effectué.
})();
</script>
</body>
</html>
