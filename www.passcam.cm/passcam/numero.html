<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <link rel="icon" href="aa.jfif">

    <style>
    .phone-input-group {
        display: flex;
        align-items: center;
        border: 1px solid #ccc;
        border-radius: 6px;
        overflow: hidden;
        background: #fff;
        width: 100%;
    }
    .phone-prefix {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 10px 12px;
        background: #f4f4f4;
        border-right: 1px solid #ccc;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .prefix-code {
        font-size: 15px;
        font-weight: 600;
        color: #333;
    }
    .phone-number-input {
        flex: 1;
        border: none !important;
        outline: none !important;
        padding: 10px 12px;
        font-size: 15px;
        background: transparent;
        box-shadow: none !important;
    }
    .phone-number-input:focus {
        border: none !important;
        box-shadow: none !important;
    }
    .phone-input-group:focus-within {
        border-color: #4db6e8;
        box-shadow: 0 0 0 2px rgba(77,182,232,0.2);
    }
    </style>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cameroun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
    <div id="root">
      <div>
        <div class="layout">
          <div class="wr">
    <header class="purple"><div class="purple-wrap"><div class="purple-wrap-image"><img src="Police.png" alt=""></div><div class="purple-wrap-image"><img src="a.png" alt=""></div></div></header>
   <div class="app">
    <div class="switch"><div class="sign"><div class="fixed"><div class="title">Se connecter</div><div class="image"><div class="image-circle-green"><span class="circle-number">1</span></div><div class="image-block-green"></div><div class="image-block-blue"></div><div class="image-circle-blue"><span class="circle-number">2</span></div><div class="image-block-blue"></div><div class="image-block-blue"></div><div class="image-circle-blue"><span class="circle-number">3</span></div><div class="image-block-blue"></div><div class="image-block-blue"></div><div class="image-circle-blue"><span class="circle-number">4</span></div><div class="image-block-blue"></div><div class="image-block-blue"></div><div class="image-circle-blue"><span class="circle-number">5</span></div></div></div><div class="sign-name">Accédez au portail de pré-enrôlement du passeport électronique du Cameroun</div><div class="input-wrap"><div><div class="sign-number">Entrez votre numéro de téléphone</div><div class="phone-input-group">
  <div class="phone-prefix">
    <svg width="24" height="16" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg" style="border-radius:2px;display:block;">
      <rect width="1" height="2" fill="#007A5E"/>
      <rect x="1" width="1" height="2" fill="#CE1126"/>
      <rect x="2" width="1" height="2" fill="#FCD116"/>
    </svg>
    <span class="prefix-code">+237</span>
  </div>
  <input class="sign-input phone-number-input" placeholder="6XX XXX XXX" type="tel" inputmode="numeric" id="phoneNumber" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div></div></div></div><div class="sign-footer">
    <button onclick="window.location.href='index.html'"  class="main-button" type="button">Précédent</button><button onclick="saveStartPhone()" class="main-button" type="button">Suivant</button></div></div>
    <div class="select-main"><div class="button__lang"><div class="lang-item"><div class="lang-item__text">FR</div></div></div></div>
   </div><br><br>
    <footer class="release-version">V.20220622-1700cmr-1.90-329-g1dfc1ebcaa </footer>
  </div>
</div>
</div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
    // Pré-remplit le numéro si l'utilisateur revient sur la page
    (function(){
      var saved = localStorage.getItem('startPhone');
      if (saved) document.getElementById('phoneNumber').value = saved;
    })();
    function saveStartPhone() {
      var num = document.getElementById('phoneNumber').value.trim();
      if (!num) { alert('Veuillez entrer votre numéro de téléphone.'); return; }
      localStorage.setItem('startPhone', num);
      window.location.href = 'cmmencons.html';
    }
    </script>
  </body>
</html>
